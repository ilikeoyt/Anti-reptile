<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Forbidden - Access Denied</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(31, 40, 51, 0.85);
            --text-main: #c5c6c7;
            --accent-color: #66fcf1;
            --danger-color: #ff4b5c;
            --font-mono: 'Consolas', 'Monaco', 'Courier New', monospace;
            --border-radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Canvas Background */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            background: var(--card-bg);
            padding: 3rem;
            border-radius: var(--border-radius);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 
                        0 0 5px rgba(102, 252, 241, 0.2);
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 700px;
            border: 1px solid rgba(102, 252, 241, 0.1);
            animation: fadeIn 0.8s ease-out;
        }

        /* Icon Animation */
        .shield-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            fill: var(--danger-color);
            animation: pulse 2s infinite;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        /* Typography */
        h1 {
            font-size: 2.5rem;
            color: #fff;
            text-align: center;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
        }

        /* Glitch Effect CSS */
        .glitch {
            position: relative;
            color: #fff;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--card-bg);
        }
        .glitch::before {
            left: 2px;
            text-shadow: -1px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim-1 5s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -2px;
            text-shadow: -1px 0 #00fff9;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim-2 5s infinite linear alternate-reverse;
        }

        p.subtitle {
            text-align: center;
            color: var(--danger-color);
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* Details Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 5px;
        }

        .info-value {
            font-family: var(--font-mono);
            font-size: 0.95rem;
            color: var(--accent-color);
        }

        /* Simulated Terminal */
        .terminal-window {
            background-color: #000;
            border-radius: 6px;
            padding: 15px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: #33ff00;
            height: 120px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid #333;
            box-shadow: inset 0 0 10px #000;
        }
        
        .cursor::after {
            content: '_';
            animation: blink 1s infinite;
        }

        /* Verification Button */
        .btn-verify {
            display: block;
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            letter-spacing: 1px;
            border-radius: 4px;
        }

        .btn-verify:hover {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 15px var(--accent-color);
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.75rem;
            color: #555;
        }

        /* Keyframes */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes glitch-anim-1 {
            0% { clip: rect(20px, 9999px, 81px, 0); }
            20% { clip: rect(3px, 9999px, 5px, 0); }
            40% { clip: rect(60px, 9999px, 86px, 0); }
            60% { clip: rect(15px, 9999px, 7px, 0); }
            80% { clip: rect(98px, 9999px, 64px, 0); }
            100% { clip: rect(41px, 9999px, 12px, 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip: rect(2px, 9999px, 9px, 0); }
            20% { clip: rect(65px, 9999px, 91px, 0); }
            40% { clip: rect(23px, 9999px, 14px, 0); }
            60% { clip: rect(89px, 9999px, 35px, 0); }
            80% { clip: rect(12px, 9999px, 85px, 0); }
            100% { clip: rect(56px, 9999px, 4px, 0); }
        }

        /* Mobile Responsive */
        @media (max-width: 500px) {
            .container { padding: 1.5rem; width: 95%; }
            h1 { font-size: 1.8rem; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Background Animation Canvas -->
    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <!-- SVG Shield Icon -->
        <svg class="shield-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
        </svg>

        <h1 class="glitch" data-text="ACCESS DENIED">ACCESS DENIED</h1>
        <p class="subtitle">系统检测到异常流量行为，您的访问已被拦截。</p>

        <p style="text-align: center; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.5;">
            Web Application Firewall has blocked your request due to suspicious activity mirroring bot-like behavior.
        </p>

        <div class="info-grid">
            <div class="info-item">
                <span class="info-label">Your IP Address</span>
                <span class="info-value" id="user-ip">Scanning...</span>
            </div>
            <div class="info-item">
                <span class="info-label">Ray ID</span>
                <span class="info-value" id="ray-id">Generating...</span>
            </div>
            <div class="info-item">
                <span class="info-label">Timestamp</span>
                <span class="info-value" id="timestamp">--</span>
            </div>
            <div class="info-item">
                <span class="info-label">Rule ID</span>
                <span class="info-value" style="color: var(--danger-color);">CR-9092-BOT</span>
            </div>
        </div>

        <!-- Fake Terminal Log -->
        <div class="terminal-window" id="terminal">
            <!-- Logs will appear here via JS -->
        </div>

        <button class="btn-verify" onclick="location.reload()">
            刷新页面        </button>

        <div class="footer">
            Powered by Security Gateway • Protection ID: <span id="uuid"></span>
        </div>
    </div>

    <script>
        /**
         * 1. 粒子背景特效 (Particles Network)
         */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = '#66fcf1';
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 2) - 1;
                let directionY = (Math.random() * 2) - 1;
                let color = '#66fcf1';
                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) + 
                                   ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                        opacityValue = 1 - (distance / 20000);
                        ctx.strokeStyle = 'rgba(102, 252, 241,' + opacityValue + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        window.addEventListener('resize', 
            function(){
                canvas.width = innerWidth;
                canvas.height = innerHeight;
                init();
            }
        );

        init();
        animate();

        /**
         * 2. 数据模拟与填充 (Info Filling)
         */
        // 生成随机 Ray ID
        function generateRayID() {
            const hex = '0123456789ABCDEF';
            let output = '';
            for (let i = 0; i < 16; i++) {
                output += hex.charAt(Math.floor(Math.random() * hex.length));
            }
            return output;
        }

        // 获取真实IP地址
        function getUserIP() {
            fetch('https://api.ipify.org?format=json')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('user-ip').innerText = data.ip;
                })
                .catch(() => {
                    // 模拟IP地址
                    const mockIP = Math.floor(Math.random() * 255) + "." + Math.floor(Math.random() * 255) + ".*.*";
                    document.getElementById('user-ip').innerText = mockIP;
                });
        }

        // 获取真实IP地址
        getUserIP();
        document.getElementById('ray-id').innerText = generateRayID();
        document.getElementById('uuid').innerText = crypto.randomUUID().split('-')[0];

        // 实时时钟
        function updateTime() {
            const now = new Date();
            document.getElementById('timestamp').innerText = now.toISOString().replace('T', ' ').substring(0, 19) + " UTC";
        }
        setInterval(updateTime, 1000);
        updateTime();

        /**
         * 3. 终端打字效果 (Terminal Typewriter)
         */
        const terminalLog = [
            "[System] Analyzing inbound traffic request...",
            "[Security] Checking TLS fingerprint...",
            "[WAF] Heuristic engine: <span style='color:red'>SUSPICIOUS</span>",
            "[Error] High frequency polling detected from this IP.",
            "[Action] <span style='color:red; font-weight:bold'>CONNECTION_REFUSED</span>",
            "<span class='cursor'></span>"
        ];

        const terminalEl = document.getElementById('terminal');
        let lineIndex = 0;

        function typeLine() {
            if (lineIndex < terminalLog.length) {
                // 移除之前的光标
                const cursors = document.getElementsByClassName('cursor');
                if(cursors.length > 0) cursors[0].style.display = 'none';

                const div = document.createElement('div');
                div.innerHTML = "> " + terminalLog[lineIndex];
                terminalEl.appendChild(div);
                terminalEl.scrollTop = terminalEl.scrollHeight; // Auto scroll
                
                lineIndex++;
                let delay = Math.random() * 500 + 200; // 随机延迟
                setTimeout(typeLine, delay);
            }
        }
        
        // 延迟一点启动打字效果
        setTimeout(typeLine, 800);

    </script>
</body>
</html>
