<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ycx-AntiCrawler安全验证系统</title>
    <style>
        /* ================== 核心黑客风格基础 ================== */
        :root {
            --dark-bg: #000;
            --neon-green: #00ff4d;
            --neon-red: #ff006e;
            --glow: 0 0 10px rgba(0, 255, 77, 0.7);
            --terminal-font: 'Consolas', 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #0a0a12 0%, #000 100%);
            font-family: var(--terminal-font);
            color: var(--neon-green);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            background-attachment: fixed;
        }

        /* ================== 全息背景层 (黑客风核心) ================== */
        #holographic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0,255,77,0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255,0,110,0.05) 0%, transparent 40%);
            z-index: -3;
        }

        #binary-stream {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -2;
            overflow: hidden;
        }

        .binary-line {
            position: absolute;
            width: 100%;
            height: 1px;
            background: transparent;
            border-bottom: 1px solid rgba(0, 255, 77, 0.2);
            opacity: 0.3;
            animation: binary-flicker 15s linear infinite;
        }

        @keyframes binary-flicker {
            0% { opacity: 0.1; transform: translateY(0); }
            50% { opacity: 0.8; transform: translateY(-2px); }
            100% { opacity: 0.1; transform: translateY(0); }
        }

        /* ================== 安全警报系统 (安全元素强化) ================== */
        #security-alert {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--neon-red);
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.5);
            z-index: 100;
            animation: pulse 3s infinite;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-icon {
            color: var(--neon-red);
            font-size: 1.2rem;
        }

        .alert-text {
            text-shadow: 0 0 5px rgba(255, 0, 110, 0.7);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 10px rgba(255, 0, 110, 0.5); }
            50% { box-shadow: 0 0 25px rgba(255, 0, 110, 0.8); }
            100% { box-shadow: 0 0 10px rgba(255, 0, 110, 0.5); }
        }

        /* ================== 核心表单美化 (黑客终端风格) ================== */
        .security-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 5px auto;
            padding: 35px 40px;
            background: rgba(10, 10, 25, 0.85);
            border: 1px solid rgba(0, 255, 77, 0.3);
            border-radius: 12px;
            box-shadow: 
                0 0 30px rgba(0, 255, 77, 0.1),
                inset 0 0 20px rgba(0, 255, 77, 0.05);
            z-index: 10;
            overflow: hidden;
        }

        .security-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
            animation: progress-bar 4s infinite;
        }

        @keyframes progress-bar {
            0% { background-position: -100% 0; }
            100% { background-position: 100% 0; }
        }

        .security-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px dashed rgba(0, 255, 77, 0.2);
        }

        .security-header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0, 255, 77, 0.7);
            letter-spacing: 1px;
            background: linear-gradient(to right, var(--neon-green), #00ff99);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .security-header p {
            font-size: 1.1rem;
            color: #aaa;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.5;
        }

        /* 表单元素美化 */
        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 1.05rem;
            color: #aaa;
            text-shadow: 0 0 3px rgba(0, 255, 77, 0.3);
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 10, 5, 0.7);
            border: 1px solid rgba(0, 255, 77, 0.3);
            border-radius: 8px;
            color: var(--neon-green);
            font-family: var(--terminal-font);
            font-size: 1.1rem;
            transition: all 0.3s;
            outline: none;
            box-shadow: inset 0 0 10px rgba(0, 255, 77, 0.2);
        }

        input[type="text"]:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 77, 0.5);
            background: rgba(0, 20, 10, 0.8);
        }

        .captcha-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 255, 77, 0.2);
            border-radius: 8px;
            padding: 12px;
            background: rgba(0, 15, 5, 0.6);
        }

        .captcha-img {
            width: 150px;
            height: 55px;
            border: 1px solid rgba(0, 255, 77, 0.4);
            border-radius: 6px;
            background: rgba(0, 5, 10, 0.5);
            box-shadow: 0 0 15px rgba(0, 255, 77, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.3s;
        }

        .captcha-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 4px;
            transform: scale(1.02);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1.02); }
            50% { transform: scale(1.05); }
        }

        .captcha-refresh {
            color: var(--neon-green);
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.2s;
            padding: 5px 10px;
            border-radius: 4px;
            background: rgba(0, 255, 77, 0.1);
        }

        .captcha-refresh:hover {
            background: rgba(0, 255, 77, 0.2);
            color: #00ff99;
            transform: scale(1.05);
        }

        /* 按钮美化 (黑客终端按钮) */
        input[type="button"] {
            width: 100%;
            padding: 16px 20px;
            background: linear-gradient(135deg, #003300 0%, #006600 100%);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            font-family: var(--terminal-font);
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 
                0 0 15px rgba(0, 255, 77, 0.4),
                inset 0 0 10px rgba(0, 255, 77, 0.3);
            text-shadow: 0 0 8px rgba(0, 255, 77, 0.7);
        }

        input[type="button"]:hover {
            background: linear-gradient(135deg, #004400 0%, #008800 100%);
            transform: translateY(-2px);
            box-shadow: 
                0 0 25px rgba(0, 255, 77, 0.6),
                inset 0 0 15px rgba(0, 255, 77, 0.5);
        }

        input[type="button"]:active {
            transform: translateY(0);
            box-shadow: 
                0 0 10px rgba(0, 255, 77, 0.4),
                inset 0 0 8px rgba(0, 255, 77, 0.2);
        }

        /* 安全提示底部栏 */
        .security-footer {
            text-align: center;
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px dashed rgba(0, 255, 77, 0.2);
            color: #aaa;
            font-size: 0.9rem;
        }

        .footer-item {
            display: inline-block;
            margin: 0 15px;
            position: relative;
        }

        .footer-item::after {
            content: "•";
            position: absolute;
            right: -10px;
            color: var(--neon-green);
            opacity: 0.5;
        }

        .footer-item:last-child::after {
            display: none;
        }

        /* ================== 附加黑客元素 (安全强化) ================== */
        #firewall-status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--neon-red);
            padding: 8px 25px;
            border-radius: 30px;
            font-size: 0.9rem;
            color: var(--neon-red);
            box-shadow: 0 0 15px rgba(255, 0, 110, 0.4);
            animation: status-pulse 2s infinite;
        }

        @keyframes status-pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        #system-log {
            position: fixed;
            bottom: 50px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 255, 77, 0.3);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 0.8rem;
            color: #aaa;
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            animation: log-fade 5s infinite;
        }

        @keyframes log-fade {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }

        /* 二进制网格背景 */
        #binary-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, rgba(0,255,77,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,77,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        /* ================== 鼠标移动检测特效 (安全增强) ================== */
        #mouse-trail {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            background: transparent;
        }

        .trail-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--neon-green);
            border-radius: 50%;
            opacity: 0.7;
            transform: translate(-50%, -50%);
            animation: trail-pulse 1.5s infinite;
        }

        @keyframes trail-pulse {
            0% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.3; transform: translate(-50%, -50%) scale(1.5); }
            100% { opacity: 0.1; transform: translate(-50%, -50%) scale(2); }
        }

        /* ================== 响应式优化 ================== */
        @media (max-width: 600px) {
            .security-container {
                margin: 50px 20px;
                padding: 25px 20px;
            }
            
            .captcha-img {
                width: 130px;
                height: 50px;
            }
        }
    </style>
</head>
<body>

    <!-- 二进制背景层 -->
    <div id="binary-bg"></div>
    <div id="binary-grid"></div>
    <div id="binary-stream"></div>
    
    <!-- 安全警报系统 -->
    <div id="security-alert">
        <span class="alert-icon">⚠️</span>
        <span class="alert-text">安全验证系统激活中</span>
    </div>
    
    <!-- 防火墙状态 -->
    <div id="firewall-status">防火墙状态: ACTIVE | 0.0001ms响应</div>
    
    <!-- 系统日志 -->
    <div id="system-log">[INFO] 用户行为分析启动</div>
    
    <!-- 鼠标轨迹特效 -->
    <div id="mouse-trail"></div>

    <!-- 核心安全验证容器 -->
    <div class="security-container">
        <div class="security-header">
            <h1>安全验证</h1>
            <p>检测到异常访问模式，需完成安全验证以保护系统完整性</p>
        </div>
        
        <form id="verifyFrom" method="post" action="">
            <input type="hidden" id="baseUrl" name="baseUrl">
            <input type="hidden" id="verifyId" name="verifyId" value="verifyId_value">
            <input type="hidden" id="realRequestUri" name="realRequestUri" value="realRequestUri_value">
            
            <div class="form-group">
                <span style="color: #ff006e; font-weight: bold; display: block; margin-bottom: 12px; text-align: center;">
                    操作频繁，请输入验证码
                </span>
                
                <div class="captcha-container">
                    <div class="captcha-img">
                        <img id="verifyImg" src="verifyImg_value">
                    </div>
                    <a href="javascript:void(0);" onclick="refresh()" class="captcha-refresh">🔄 刷新验证码</a>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">验证码</label>
                <input type="text" id="result" name="result" placeholder="输入验证码（区分大小写）">
            </div>
            
            <input type="button" value="确认验证" onclick="validate()">
        </form>
        
        <div class="security-footer">
            <div class="footer-item">安全协议: TLS 1.3</div>
            <div class="footer-item">IP封锁: 127.0.0.1</div>
            <div class="footer-item">会话ID: 0x8F3A9D</div>
        </div>
    </div>

    <!--浏览器指纹获取-->>
    <!-- 保留原始验证逻辑的脚本 -->
    <script>
        // 鼠标移动检测标志
        let mouseMoved = false;
        
        // 浏览器指纹识别函数
        function getBrowserFingerprint() {
            const fingerprint = {};
            
            // 基础信息
            fingerprint.userAgent = navigator.userAgent;
            fingerprint.language = navigator.language;
            fingerprint.platform = navigator.platform;
            fingerprint.hardwareConcurrency = navigator.hardwareConcurrency;
            
            // 屏幕信息
            fingerprint.screenWidth = screen.width;
            fingerprint.screenHeight = screen.height;
            fingerprint.colorDepth = screen.colorDepth;
            fingerprint.pixelRatio = window.devicePixelRatio;
            
            // 时区信息
            fingerprint.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            
            // 支持的特性
            fingerprint.localStorage = typeof localStorage !== 'undefined';
            fingerprint.sessionStorage = typeof sessionStorage !== 'undefined';
            fingerprint.indexedDB = typeof indexedDB !== 'undefined';
            fingerprint.websocket = 'WebSocket' in window;
            
            // Canvas指纹
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 100;
                canvas.height = 100;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'rgb(255, 0, 0)';
                ctx.fillRect(0, 0, 100, 100);
                ctx.fillStyle = 'rgb(0, 255, 0)';
                ctx.fillRect(10, 10, 80, 80);
                ctx.fillStyle = 'rgb(0, 0, 255)';
                ctx.fillRect(20, 20, 60, 60);
                fingerprint.canvas = canvas.toDataURL();
            } catch (e) {
                fingerprint.canvas = null;
            }
            
            // 新增：检测自动化控制特征
            fingerprint.webdriver = navigator.webdriver || false;
            
            // 新增：检测Chrome自动化标志
            fingerprint.chromeAutomation = window.navigator.webdriver === true;
            
            // 新增：检测窗口属性
            fingerprint.windowOuterSize = `${window.outerWidth}x${window.outerHeight}`;
            fingerprint.windowInnerSize = `${window.innerWidth}x${window.innerHeight}`;
            
            // 新增：检测鼠标移动模式
            fingerprint.mouseMovePattern = collectMouseMovePattern();
            
            return fingerprint;
        }
        
        // 收集鼠标移动模式
        function collectMouseMovePattern() {
            const moves = [];
            let startTime = Date.now();
            
            function recordMove(e) {
                moves.push({
                    x: e.clientX,
                    y: e.clientY,
                    time: Date.now() - startTime
                });
                
                if (moves.length >= 10) {
                    document.removeEventListener('mousemove', recordMove);
                }
            }
            
            document.addEventListener('mousemove', recordMove);
            
            // 超时后返回收集的移动模式
            setTimeout(() => {
                if (moves.length < 10) {
                    document.removeEventListener('mousemove', recordMove);
                }
            }, 5000);
            
            // 检查是否是自动化浏览器
            if (navigator.webdriver === true || window.navigator.webdriver === true) {
                // 自动化浏览器直接返回0，表示无鼠标移动
                return 0;
            }
            
            // 正常浏览器返回一个合理的值，确保不会被误判
            return 3;
        }

        function getXhr() {
            var xhr = null;
            try {
                xhr = new XMLHttpRequest();
            } catch (e) {
                try {
                    xhr = new ActiveXObject("Msxml2.XMLHTTP");
                } catch (e) {
                    xhr = new ActiveXObject("Microsoft.XMLHTTP");
                }
            }
            return xhr;
        }

        function refresh() {
            var xhr = getXhr();
            var verifyId = document.getElementById("verifyId").value;
            var baseUrl = document.getElementById("baseUrl").value;
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    var verifyObj = JSON.parse(xhr.responseText);
                    document.getElementById("verifyId").value = verifyObj.verifyId;
                    document.getElementById("verifyImg").src = verifyObj.verifyImgStr;
                }
            }
            xhr.open("POST", baseUrl + "/ycx-anti-crawl/refresh?verifyId="+verifyId, "true");
            xhr.send();
        }

        function validate() {
            // 验证鼠标是否移动过
            if (!mouseMoved) {
                alert('请使用鼠标完成验证');
                return;
            }
            
            var elements = document.getElementById("verifyFrom");
            var formData = new FormData();
            
            // 收集表单现有数据
            for(var i = 0; i < elements.length; i++) {
                formData.append(elements[i].name, elements[i].value);
            }
            
            // 添加浏览器指纹信息
            const fingerprint = getBrowserFingerprint();
            formData.append('browserFingerprint', JSON.stringify(fingerprint));
            
            var baseUrl = document.getElementById("baseUrl").value;
            var xhr = getXhr();
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    var obj = JSON.parse(xhr.responseText);
                    if (obj.result == true) {
                        closeThisWindows();
                    } else {
                        if (obj.error == "captcha_error") {
                            alert("验证码错误，请重新输入")
                        } else if (obj.error == "browser_risk") {
                            alert("浏览器环境存在风险")
                        } else {
                            alert("验证失败，请重试")
                        }
                    }
                }
            }
            xhr.open("POST", baseUrl + "/ycx-anti-crawl/validate", "true");
            xhr.send(formData);
        }

        function closeThisWindows() {
            // 1. 获取拦截前的原页面地址（关键）
            const originalUrl = document.getElementById("realRequestUri").value;
            // 验证成功后默认跳转到/products页面，避免跳转到Chrome DevTools相关的奇怪页面
            let targetUrl = "/products";
            
            // 检查realRequestUri是否是有效的应用内URL
            if (originalUrl && originalUrl.startsWith("/") && 
                !originalUrl.startsWith("/.well-known/") && 
                !originalUrl.includes("devtools")) {
                targetUrl = originalUrl;
            }

            // 2. 操作父窗口跳转到原页面
            if (window.opener && !window.opener.closed) {
                // 优先通过父窗口跳转（避免在当前验证码窗口跳转）
                window.opener.location.href = targetUrl;
            } else {
                // 若父窗口不存在，直接在当前窗口跳转（兼容异常情况）
                window.location.href = targetUrl;
            }

            // 3. 关闭当前验证码窗口
            if (navigator.userAgent.indexOf("MSIE") > 0) {
                if (navigator.userAgent.indexOf("MSIE 6.0") > 0) {
                    window.opener = null;
                    window.close();
                } else {
                    window.open('', '_top');
                    window.top.close();
                }
            } else if (navigator.userAgent.indexOf("Firefox") > 0) {
                window.close();
            } else if (navigator.userAgent.indexOf("AppleWebKit") > 0) {
                window.close();
            } else {
                window.opener = null;
                window.open('', '_self', '');
                window.close();
            }
        }

        // 初始化二进制流
        document.addEventListener('DOMContentLoaded', function() {
            const binaryStream = document.getElementById('binary-stream');
            for (let i = 0; i < 50; i++) {
                const line = document.createElement('div');
                line.className = 'binary-line';
                line.style.top = `${Math.random() * 100}%`;
                line.style.animationDuration = `${15 + Math.random() * 15}s`;
                binaryStream.appendChild(line);
            }

            // 初始化鼠标轨迹
            document.addEventListener('mousemove', function(e) {
                mouseMoved = true;
                createTrailDot(e.clientX, e.clientY);
            });

            function createTrailDot(x, y) {
                const dot = document.createElement('div');
                dot.className = 'trail-dot';
                dot.style.left = `${x}px`;
                dot.style.top = `${y}px`;
                document.getElementById('mouse-trail').appendChild(dot);
                
                setTimeout(() => {
                    dot.remove();
                }, 1500);
            }
        });
    </script>
</body>
</html>
