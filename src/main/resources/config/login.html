<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反爬虫配置管理 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #a8e6cf 0%, #dcedc1 25%, #ffd3b6 50%, #ffaaa5 75%, #ff8b94 100%);
            overflow: hidden;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .subtitle {
            font-size: 12px;
            font-weight: 500;
            color: #999;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .title {
            font-size: 28px;
            font-weight: 600;
            color: #333;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 15px;
            font-weight: 500;
            color: #333;
            margin-bottom: 10px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            color: #333;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .form-input::placeholder {
            color: #bbb;
        }

        .form-input:focus {
            border-color: #999;
        }

        .btn-login {
            width: 100%;
            padding: 14px 24px;
            margin-top: 16px;
            background: #000000;
            color: #ffffff;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-login:hover {
            background: #333;
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .alert {
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .alert-error {
            background: #ffe5e5;
            color: #d32f2f;
            border: 1px solid #ffcdd2;
        }

        @media (max-width: 480px) {
            .login-card {
                margin: 20px;
                padding: 36px 28px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="header">
            <div class="subtitle">ANTI-CRAWLER SYSTEM</div>
            <h1 class="title">反爬虫配置管理</h1>
        </div>

        <div id="alert" class="alert alert-error"></div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn-login">进入系统</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = this.querySelector('button');
            const originalText = btn.textContent;
            
            btn.textContent = '验证中...';
            btn.disabled = true;
            
            fetch('/ycx-config/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    window.location.href = '/ycx-config/index.html';
                } else {
                    btn.textContent = originalText;
                    btn.disabled = false;
                    const alert = document.getElementById('alert');
                    alert.textContent = result.message;
                    alert.style.display = 'block';
                }
            })
            .catch(error => {
                btn.textContent = originalText;
                btn.disabled = false;
                const alert = document.getElementById('alert');
                alert.textContent = '登录失败: ' + error.message;
                alert.style.display = 'block';
            });
        });
    </script>
</body>
</html>
